{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incredible India Tours | Discover Heritage</title>
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="mandala-bg"></div>
    <div class="mandala-bg two"></div>
    
    <nav class="glass-nav">
        <div class="logo">India Tours</div>
        <ul class="nav-links">
            <li><a href="{% url 'index' %}">Home</a></li>
            <li><a href="{% url 'destinations' %}">Destinations</a></li>
            <li><a href="{% url 'about' %}">About</a></li>
        </ul>
    </nav>

    {% block content %}
    {% endblock content %}

    <!-- AI Chat Widget -->
    <div class="chat-widget">
        <div class="chat-toggle" id="chatToggle">
            <span class="chat-icon">🪷</span>
            <span class="chat-badge">1</span>
        </div>
        
        <div class="chat-container glass-card hidden" id="chatContainer">
            <div class="chat-header">
                <div class="avatar">🪷</div>
                <div class="header-info">
                    <h4>Vanakam Guide AI</h4>
                    <p class="status">Online</p>
                </div>
                <button class="close-chat" id="closeChat">&times;</button>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="message ai">
                    <div class="message-content">
                        Vanakam! I am your Incredible India Guide AI. How may I assist you in planning your majestic tour today?
                    </div>
                </div>
            </div>
            
            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="Ask about Taj Mahal, Kerala, Goa...">
                <button id="sendMessage" aria-label="Send Message">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="{% static 'core/js/chat.js' %}"></script>
</body>
</html>
